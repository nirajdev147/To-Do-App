<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="/static/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <title>Confirm Delete</title>
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow p-4 text-center border-0" style="max-width: 400px;">
        <h4 class="fw-bold text-danger mb-3"><i class="bi bi-exclamation-triangle-fill"></i> Confirm Deletion</h4>
        <p class="text-muted">Are you sure you want to permanently erase <strong>"{{ task.title }}"</strong>?</p>
        <form method="POST" class="d-flex justify-content-center gap-2 mt-4">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
            <a href="{% url 'task_list' %}" class="btn btn-light border px-4">Cancel</a>
        </form>
    </div>
</body>
</html>
