{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <title>New Category</title>
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-sm border-0 p-4" style="max-width: 400px; width: 100%;">
        <h4 class="fw-bold text-center text-primary mb-3">📂 Create Folder Category</h4>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success w-100 py-2">Add Folder</button>
        </form>
        <div class="text-center mt-3">
            <a href="{% url 'task_list' %}" class="text-muted small">Cancel and Go Back</a>
        </div>
    </div>
</body>
</html>
