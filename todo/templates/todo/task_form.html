{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <title>Task Form</title>
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-sm border-0 p-4" style="max-width: 450px; width: 100%;">
        <h4 class="fw-bold text-center text-primary mb-3">
            {% if form.instance.pk %}
                <i class="bi bi-pencil-square"></i> Edit Task
            {% else %}
                <i class="bi bi-plus-circle"></i> New Task
            {% endif %}
        </h4>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                {{ form.as_p }}
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Save Action</button>
        </form>
        <div class="text-center mt-3">
            <a href="{% url 'task_list' %}" class="text-muted small">Cancel and Go Back</a>
        </div>
    </div>
</body>
</html>
