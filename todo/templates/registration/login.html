{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <title>Login</title>
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-sm border-0 p-4" style="max-width: 400px; width: 100%;">
        <h3 class="fw-bold text-center text-primary mb-2"><i class="bi bi-box-arrow-in-right"></i> Sign In</h3>
        <p class="text-muted text-center small mb-4">Access your personal task space</p>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100 py-2 mt-2">Login</button>
        </form>
        <div class="text-center mt-4">
            <span class="text-muted small">New here? </span><a href="{% url 'register' %}" class="small text-decoration-none">Create an account</a>
        </div>
    </div>
</body>
</html>
