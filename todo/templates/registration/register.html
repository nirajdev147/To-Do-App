{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <title>Sign Up</title>
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-sm border-0 p-4" style="max-width: 400px; width: 100%;">
        <h3 class="fw-bold text-center text-success mb-2">Create Account</h3>
        <p class="text-muted text-center small mb-4">Register to plan your daily tasks</p>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success w-100 py-2 mt-2">Sign Up</button>
        </form>
        <div class="text-center mt-4">
            <span class="text-muted small">Already have an account? </span><a href="{% url 'login' %}" class="small text-decoration-none">Sign In</a>
        </div>
    </div>
</body>
</html>
